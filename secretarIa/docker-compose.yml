services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # volumes:
    #   - .:/app # Descomente para desenvolvimento local. Em produção (Easypanel), isso pode sobrescrever o código.
    environment:
      - APP_ENV=development
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    restart: unless-stopped
